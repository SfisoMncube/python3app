apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  labels:
    app: python-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-app
        image: sfisowandile/python-app:v1
        ports:
        - containerPort: 5000



---
apiVersion: v1
kind: Service
metadata:
  name: python-service
spec:
  type: NodePort
  selector:
    app: python-app
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
    nodePort: 30200