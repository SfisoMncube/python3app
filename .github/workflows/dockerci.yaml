name: cicd


#this mean the pipeline will run on push to the repository 
on:
  push:
    paths:
    - src/**
    branches:
    - main
#There was a problem with the runner as the image runs on alpine.
jobs:
  docker:
    outputs:
        commit_id: ${{github.sha}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sfisowandile/python-app:${{github.sha}}

  cd:
    needs: docker
    runs-on: self-hosted
    steps:

    - name: value file
      shell: bash
      run: |
        echo ${{ needs.docker.outputs.commit_id }}
        # install go-based yq (recommended)
        install wget -y
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

        # update image tag in values.yaml
        yq e '.image.tag = "${{ needs.docker.outputs.commit_id }}"' \
        -i charts/python-app/values.yaml
    

    - name: commit changes
      uses: EndBug/add-and-commit@v9
      with:
        messages: "Update the yaml"

    
    - name: argocd installation
      shell: bash
      run: |
        curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x argocd-linux-amd64
        sudo mv ./argocd-linux-amd64 /usr/local/bin/argocd

    - name: Argocd app sync
      shell: bash
      run: |
        argocd login argocd-server.argocd  --insecure --grpc-web --username admin --password ${{secrets.ARGO_PASSWORD}}
        argocd app sync python-app --insecure --grpc-web