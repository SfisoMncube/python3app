name: cicd


#this mean the pipeline will run on push to the repository 
on:
  push:
    paths:
    - src/**
    branches:
    - main
#There was a problem with the runner as the image runs on alpine.
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sfisowandile/python-app:${{github.sha}}

  cd:
    needs: docker
    runs-on: self-hosted
    steps:
    
    - name: argocd installation
      shell: bash
      run: |
        curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
        chmod +x argocd-linux-amd64
        sudo mv ./argocd /usr/local/bin/argocd

    - name: Argocd app sync
      shell: bash
      run: |
        argocd login argocd-server.argocd  --insecure --grpc-web --username admin --password ${{secrets.ARGO_PASSWORD}}
        argocd app sync python-app